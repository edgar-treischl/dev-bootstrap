site_name: dev-bootstrap
site_description: Bootstrap and manage your multi-repo development environment.
site_url: https://edgar-treischl.github.io/dev-bootstrap/
repo_url: https://github.com/edgar-treischl/dev-bootstrap
repo_name: edgar-treischl/dev-bootstrap

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - CLI Commands: usage.md
      - Scanning Repos: scan.md
  - Reference:
      - .repo-meta.yml Schema: repo-meta.md
      - Shell Scripts: shell-scripts.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
